# =============================================================================
# deploy.yml — Pipeline CI/CD completo con DevSecOps
# Proyecto Final SO2 — Antonio Samayoa
#
# TRIGGER: cualquier push a la rama main
# JOBS:
#   1. test          → ejecuta pytest
#   2. build-and-scan → build Docker + escaneo Trivy + push a Docker Hub
#   3. deploy        → actualiza el servicio en Docker Swarm vía SSH
#
# SECRETS REQUERIDOS (configurar en GitHub → Settings → Secrets → Actions):
#   DOCKER_USERNAME  → tu usuario de Docker Hub
#   DOCKER_TOKEN     → token de acceso de Docker Hub (no tu contraseña)
#   EC2_HOST         → IP pública del Swarm Manager (output de Terraform)
#   EC2_USER         → ec2-user (usuario por defecto en Amazon Linux)
#   EC2_SSH_KEY      → contenido completo de tu archivo .pem (-----BEGIN RSA...)
# =============================================================================

name: CI/CD — Inventario TI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

# Variables de entorno disponibles en todos los jobs
env:
  IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/inventario-ti
  IMAGE_FRONTEND: ${{ secrets.DOCKER_USERNAME }}/inventario-ti-frontend
  SERVICE_NAME: inventario_api          # Nombre del servicio API en el Swarm stack
  SERVICE_FRONTEND: inventario_frontend # Nombre del servicio frontend en el Swarm stack

# =============================================================================
# JOB 1: TEST — Ejecutar pruebas unitarias
# =============================================================================
jobs:
  test:
    name: "Pruebas Unitarias"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"             # Cache de dependencias para builds más rápidos

      - name: Instalar dependencias
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ejecutar tests con pytest
        run: |
          # Si no hay carpeta tests aún, crear un test básico para no fallar
          mkdir -p tests
          if [ ! -f tests/test_health.py ]; then
            cat > tests/test_health.py << 'EOF'
          # Test básico — verifica que la app importa y el health endpoint responde
          from fastapi.testclient import TestClient
          import sys, os
          sys.path.insert(0, os.path.dirname(os.path.dirname(os.path.abspath(__file__))))

          # Mock de la base de datos para tests unitarios
          import unittest.mock as mock
          with mock.patch("app.database.engine") as mock_engine, \
               mock.patch("app.database.Base.metadata.create_all"):
              from app.main import app

          client = TestClient(app)

          def test_root():
              response = client.get("/")
              assert response.status_code == 200

          def test_health():
              response = client.get("/health")
              assert response.status_code == 200
              assert response.json()["status"] == "healthy"
          EOF
          fi
          pytest tests/ -v --tb=short

# =============================================================================
# JOB 2: BUILD + ESCANEO DE SEGURIDAD + PUSH A DOCKER HUB
# =============================================================================
  build-and-scan:
    name: "Build, Trivy Scan & Push"
    runs-on: ubuntu-latest
    needs: test            # Solo ejecuta si los tests pasan

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      # Optimización: habilita QEMU y Buildx para builds multi-plataforma
      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login a Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      # Build de la imagen con dos tags:
      # :latest → siempre la versión más reciente
      # :SHA    → tag inmutable con el hash del commit para trazabilidad
      - name: Build de imagen Docker
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false             # No hacer push aún — primero escanear
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          # Cargar en el daemon local para que Trivy pueda escanearla
          load: true
          cache-from: type=gha   # Cache de GitHub Actions para builds más rápidos
          cache-to: type=gha,mode=max

      # -----------------------------------------------------------------------
      # DevSecOps: Escaneo de vulnerabilidades con Trivy
      # Solo falla si encuentra CRITICAL (sin fix disponible).
      # Las HIGH sin parche disponible se reportan pero no bloquean el deploy.
      # Esto es un balance entre seguridad y operatividad para el proyecto.
      # -----------------------------------------------------------------------
      - name: Escaneo de seguridad con Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "${{ env.IMAGE_NAME }}:latest"
          format: "table"
          exit-code: "1"          # Falla el job si encuentra vulnerabilidades CRITICAL
          ignore-unfixed: true    # Ignorar CVEs sin fix disponible (reduce falsos positivos)
          vuln-type: "os,library"
          severity: "CRITICAL"    # Solo bloquear en CRITICAL, HIGH se reporta sin bloquear

      # Solo hace push si el escaneo Trivy pasó sin errores críticos
      - name: Push de imagen a Docker Hub
        if: success()
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # -----------------------------------------------------------------------
      # Frontend Streamlit: build, escaneo y push
      # -----------------------------------------------------------------------
      - name: Build de imagen Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: false
          tags: |
            ${{ env.IMAGE_FRONTEND }}:latest
            ${{ env.IMAGE_FRONTEND }}:${{ github.sha }}
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Escaneo de seguridad Frontend con Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "${{ env.IMAGE_FRONTEND }}:latest"
          format: "table"
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: "os,library"
          severity: "CRITICAL"

      - name: Push de imagen Frontend a Docker Hub
        if: success()
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.IMAGE_FRONTEND }}:latest
            ${{ env.IMAGE_FRONTEND }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Resumen del build
        if: always()
        run: |
          echo "## Resultado del Build" >> $GITHUB_STEP_SUMMARY
          echo "- **API**: ${{ env.IMAGE_NAME }}:latest / ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Frontend**: ${{ env.IMAGE_FRONTEND }}:latest / ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Autor**: ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY

# =============================================================================
# JOB 3: DEPLOY — Actualizar el servicio en Docker Swarm vía SSH
# =============================================================================
  deploy:
    name: "Deploy a Docker Swarm"
    runs-on: ubuntu-latest
    needs: build-and-scan    # Solo deploya si build y scan pasaron
    # Solo deployar en push a main (no en Pull Requests)
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      # Configurar el agente SSH con la llave privada desde el secret
      - name: Preparar clave SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          # Timeout 10s para no colgar el pipeline si el host no responde
          ssh-keyscan -T 10 -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts || true

      # Copiar archivos de configuración al servidor (necesario para primer deploy)
      - name: Copiar archivos de configuración al servidor
        run: |
          scp -i ~/.ssh/id_rsa \
              -o StrictHostKeyChecking=no \
              -o ConnectTimeout=15 \
              production-stack.yml \
              ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/home/ec2-user/production-stack.yml
          scp -i ~/.ssh/id_rsa \
              -o StrictHostKeyChecking=no \
              -o ConnectTimeout=15 \
              nginx/nginx.conf \
              ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/home/ec2-user/nginx.conf

      # Conectarse al Manager del Swarm y actualizar la API y el Frontend
      # Si los servicios no existen aún (primer deploy), hace docker stack deploy
      - name: Deploy rolling update en Swarm
        timeout-minutes: 10
        run: |
          ssh -i ~/.ssh/id_rsa \
              -o StrictHostKeyChecking=no \
              -o ConnectTimeout=15 \
              -o ServerAliveInterval=30 \
              -o ServerAliveCountMax=3 \
              ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'ENDSSH'
            set -e
            SHA="${{ github.sha }}"
            IMAGE_API="${{ env.IMAGE_NAME }}"
            IMAGE_FE="${{ env.IMAGE_FRONTEND }}"
            DB_URL="${{ secrets.DATABASE_URL }}"

            echo "==> Pulling images..."
            docker pull "${IMAGE_API}:${SHA}"
            docker pull "${IMAGE_FE}:${SHA}"

            # Si el servicio de API ya existe → rolling update; si no → primer stack deploy
            if docker service inspect inventario_api > /dev/null 2>&1; then
              echo "==> Updating existing services..."
              docker service update \
                --image "${IMAGE_API}:${SHA}" \
                --env-add "DATABASE_URL=${DB_URL}" \
                --update-parallelism 1 \
                --update-delay 15s \
                --update-order stop-first \
                inventario_api
              docker service update \
                --image "${IMAGE_FE}:${SHA}" \
                --update-parallelism 1 \
                --update-delay 10s \
                --update-order stop-first \
                inventario_frontend
            else
              echo "==> First deploy — initializing stack..."
              cd /home/ec2-user
              # Crear el Docker config de nginx si no existe
              docker config ls | grep -q nginx_config || \
                docker config create nginx_config /home/ec2-user/nginx.conf
              docker stack deploy -c production-stack.yml inventario --with-registry-auth
            fi
            echo "==> Done."
          ENDSSH

      - name: Verificar deploy exitoso
        timeout-minutes: 3
        run: |
          sleep 20
          ssh -i ~/.ssh/id_rsa \
              -o StrictHostKeyChecking=no \
              -o ConnectTimeout=15 \
              ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} \
              "RUNNING_API=\$(docker service ps inventario_api --filter 'desired-state=running' --format '{{.CurrentState}}' | grep -c 'Running' || echo 0) && \
               RUNNING_FE=\$(docker service ps inventario_frontend --filter 'desired-state=running' --format '{{.CurrentState}}' | grep -c 'Running' || echo 0) && \
               echo 'API replicas running:' \$RUNNING_API && \
               echo 'Frontend replicas running:' \$RUNNING_FE && \
               docker service ls --filter name=inventario && \
               [ \"\$RUNNING_API\" -ge 1 ] && [ \"\$RUNNING_FE\" -ge 1 ] && echo '✅ Deploy exitoso' || (echo '❌ Deploy fallido' && exit 1)"

      - name: Resumen del deploy
        if: always()
        run: |
          echo "## Resultado del Deploy" >> $GITHUB_STEP_SUMMARY
          echo "- **Servidor**: ${{ secrets.EC2_HOST }}" >> $GITHUB_STEP_SUMMARY
          echo "- **API**: ${{ env.IMAGE_NAME }}:${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Frontend**: ${{ env.IMAGE_FRONTEND }}:${{ github.sha }}" >> $GITHUB_STEP_SUMMARY

      # Limpiar la llave SSH del runner (buena práctica de seguridad)
      - name: Limpiar clave SSH
        if: always()
        run: rm -f ~/.ssh/id_rsa
