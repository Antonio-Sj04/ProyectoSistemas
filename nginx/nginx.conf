# =============================================================================
# nginx.conf — Reverse proxy para el Sistema de Inventario TI
# Balancea trafico del puerto 80 hacia la API FastAPI (puerto 8000)
# Crear el Docker config con: docker config create nginx_config nginx/nginx.conf
# =============================================================================

events {
    worker_connections 1024;
}

http {
    # Upstream apunta al servicio 'api' dentro de la red overlay de Swarm
    upstream api_backend {
        server api:8000;
        keepalive 32;
    }

    # Logs
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # Optimizacion
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain application/json application/javascript text/css;

    server {
        listen 80;
        server_name _;

        # Health check de nginx (no pasa a la API)
        location /nginx-health {
            access_log off;
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }

        # Todo el trafico pasa a la API FastAPI
        location / {
            proxy_pass         http://api_backend;
            proxy_http_version 1.1;

            # Headers necesarios para que FastAPI sepa la IP real del cliente
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";

            # Timeouts razonables para t3.micro
            proxy_connect_timeout 10s;
            proxy_send_timeout    60s;
            proxy_read_timeout    60s;

            # Buffer para respuestas grandes (Swagger UI)
            proxy_buffer_size          16k;
            proxy_buffers              8 16k;
            proxy_busy_buffers_size    32k;
        }
    }
}
