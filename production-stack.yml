# =============================================================================
# production-stack.yml — Docker Swarm Stack para PRODUCCIÓN en AWS
# Deploy con: docker stack deploy -c production-stack.yml inventario
# Ver servicios: docker service ls
# Ver logs API: docker service logs inventario_api
# =============================================================================

version: "3.9"

# =============================================================================
# SECRETS — valores sensibles inyectados de forma segura en el Swarm
# Crear antes del deploy: echo "postgresql://..." | docker secret create db_url -
# =============================================================================
secrets:
  db_url:
    external: true    # Debe existir en el Swarm antes del deploy

# =============================================================================
# REDES
# =============================================================================
networks:
  red-produccion:
    driver: overlay        # Red overlay: conecta contenedores en distintos nodos
    attachable: true       # Permite que contenedores standalone se unan

# =============================================================================
# VOLÚMENES PERSISTENTES
# =============================================================================
volumes:
  postgres_data:
    driver: local
  grafana_data:
    driver: local
  prometheus_data:
    driver: local

# =============================================================================
# SERVICIOS
# =============================================================================
services:

  # ---------------------------------------------------------------------------
  # NGINX — Balanceador de carga / Reverse Proxy
  # Puerto 80 público → distribuye entre réplicas de la API
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:alpine
    ports:
      - target: 80
        published: 80
        protocol: tcp
        mode: host          # Una sola IP pública para acceder a la API
    configs:
      - source: nginx_config
        target: /etc/nginx/nginx.conf
    networks:
      - red-produccion
    depends_on:
      - api
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager    # El nginx corre en el manager
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first

  # ---------------------------------------------------------------------------
  # API FastAPI — 2 réplicas para alta disponibilidad
  # ---------------------------------------------------------------------------
  api:
    image: ${DOCKER_HUB_USER:-miusuario}/inventario-ti:latest
    networks:
      - red-produccion
    secrets:
      - db_url
    environment:
      # Leer DATABASE_URL desde el secret de Swarm
      DATABASE_URL_FILE: /run/secrets/db_url
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      replicas: 2
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 3
        window: 120s
      update_config:
        parallelism: 1          # Actualizar una réplica a la vez
        delay: 10s              # Esperar 10s entre réplicas
        order: start-first      # ZERO-DOWNTIME: arrancar nueva antes de detener la vieja
        failure_action: rollback
        monitor: 30s
      rollback_config:
        parallelism: 1
        delay: 5s
        order: stop-first
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
        reservations:
          memory: 256M

  # ---------------------------------------------------------------------------
  # PostgreSQL — 1 réplica fija en el manager (donde está el volumen)
  # ---------------------------------------------------------------------------
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-inventario}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secreto}
      POSTGRES_DB: ${POSTGRES_DB:-inventario_ti}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - red-produccion
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-inventario}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager    # El volumen de datos vive en el manager
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3

  # ---------------------------------------------------------------------------
  # PROMETHEUS — Recolección de métricas
  # ---------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
      - "--storage.tsdb.retention.time=15d"
    networks:
      - red-produccion
    ports:
      - "9090:9090"
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure

  # ---------------------------------------------------------------------------
  # GRAFANA — Dashboard de visualización
  # ---------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:latest
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin123}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/datasource.yml:/etc/grafana/provisioning/datasources/datasource.yml:ro
    ports:
      - "3000:3000"
    networks:
      - red-produccion
    depends_on:
      - prometheus
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure

# =============================================================================
# CONFIGS — Configuración de Nginx inline
# =============================================================================
configs:
  nginx_config:
    content: |
      events {
          worker_connections 1024;
      }

      http {
          upstream api_backend {
              # Docker Swarm resuelve "api" a todas las réplicas con round-robin
              server api:8000;
          }

          server {
              listen 80;

              location / {
                  proxy_pass         http://api_backend;
                  proxy_set_header   Host              $host;
                  proxy_set_header   X-Real-IP         $remote_addr;
                  proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
                  proxy_connect_timeout 10s;
                  proxy_read_timeout    60s;
              }

              location /health {
                  proxy_pass http://api_backend/health;
              }
          }
      }
