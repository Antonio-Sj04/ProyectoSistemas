# =============================================================================
# docker-compose.yml — Entorno de DESARROLLO LOCAL
# Levanta la API + PostgreSQL en tu máquina Windows con Docker Desktop
# Uso: docker-compose up --build
# =============================================================================

version: "3.9"

services:

  # ---------------------------------------------------------------------------
  # Servicio: Base de Datos PostgreSQL
  # ---------------------------------------------------------------------------
  db:
    image: postgres:15-alpine        # Alpine = imagen ligera (~80MB vs ~300MB)
    container_name: inventario_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      # Volumen nombrado para persistir datos entre reinicios
      - postgres_data:/var/lib/postgresql/data
      # Script SQL inicial — se ejecuta una sola vez al crear el contenedor
      - ./sql/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
    ports:
      # Exponer al host para conectarse con DBeaver en desarrollo
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - red-inventario
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Servicio: API FastAPI
  # ---------------------------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: inventario_api
    environment:
      DATABASE_URL: ${DATABASE_URL}
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy    # Espera que Postgres esté listo antes de arrancar
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - red-inventario
    restart: unless-stopped
    # Montar código fuente para hot-reload en desarrollo (comentar en producción)
    volumes:
      - ./app:/app/app

# -----------------------------------------------------------------------------
# Redes
# -----------------------------------------------------------------------------
networks:
  red-inventario:
    driver: bridge

# -----------------------------------------------------------------------------
# Volúmenes persistentes
# -----------------------------------------------------------------------------
volumes:
  postgres_data:
    driver: local
